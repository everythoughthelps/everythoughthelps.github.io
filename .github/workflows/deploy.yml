name: Deploy Blog

on:
  push:
    branches:
      - main  # 触发工作流的分支，通常是 main 或 master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js (if needed)
        uses: actions/setup-node@v3
        with:
          node-version: 18  # 根据你的项目需求调整 Node.js 版本

      - name: Install dependencies
        run: |
          npm install  # 或者 yarn install，根据你的项目需求

      - name: Build blog
        run: |
          npm run build  # 或者 hugo、jekyll build 等，根据你的项目需求

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # GitHub 自动提供的 token
          publish_dir: ./public  # 生成的静态文件目录
